<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ settings.blog_title }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <a href="/" class="site-logo">
                    <span class="logo-icon">&#10022;</span>
                    <span class="logo-text">{{ settings.blog_title }}</span>
                </a>
                <nav class="site-nav">
                    <form class="navbar-search" action="/" method="get" role="search" onsubmit="headerSearch(event)">
                        <input type="text" id="header-search-input" name="q" placeholder="搜索文章..." autocomplete="off">
                        <button type="submit" id="search-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </form>
                    <a href="/" class="nav-link" target="_blank">首页</a>
                    <a href="/categories" class="nav-link" target="_blank">分类</a>
                    <a href="/archives" class="nav-link" target="_blank">归档</a>
                    <a href="/links" class="nav-link" target="_blank">友链</a>
                    <a href="/admin" class="nav-link nav-admin" target="_blank">管理</a>
                </nav>
                <button class="menu-toggle" onclick="document.querySelector('.site-nav').classList.toggle('open')">&#9776;</button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>{{ settings.blog_footer }}</p>
            <p class="footer-sub">Powered by <strong>Halo Blog</strong> (Python Edition)</p>
            <p class="footer-brand"><small>&copy; 2026 ArcaneCoreX-dev | <a href="https://github.com" target="_blank">GitHub</a></small></p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    {% block scripts %}{% endblock %}
</body>
</html>
